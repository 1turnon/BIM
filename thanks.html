<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias | BIM Global Studio</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #07111f;
      color: #eef4ff;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .box {
      max-width: 700px;
      width: 100%;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      text-align: center;
    }
    h1 {
      margin-bottom: 16px;
      font-size: 2.2rem;
    }
    p {
      color: #a8b3c7;
      line-height: 1.8;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      background: linear-gradient(135deg, #5ea0ff, #7dd3fc);
      color: #06101d;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Gracias por tu mensaje</h1>
    <p>Tu consulta fue enviada correctamente. Te responderemos lo antes posible.</p>
    <a href="./index.html">Volver al sitio</a>
  </div>
</body>
</html>
